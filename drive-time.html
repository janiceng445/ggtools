<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Planner — GG.Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/navigation.css">
<link rel="stylesheet" href="css/drive-time.css">
</head>
<body>
<div id="app">
  <div id="nav-placeholder"></div>

  <div id="page-container">
    <div class="page-header">
      <div class="accent-line" style="background:var(--accent)"></div>
      <h1>Time Planner</h1>
      <p>Figure out when you'll finish — or when to start.</p>
    </div>

    <div class="drive-wrap">

      <!-- Mode toggle -->
      <div class="drive-toggle">
        <button class="drive-mode-btn active" id="mode-arrive" onclick="setDriveMode('arrive')">When do I finish?</button>
        <button class="drive-mode-btn" id="mode-depart" onclick="setDriveMode('depart')">When do I start?</button>
      </div>

      <!-- Time input -->
      <div class="drive-field">
        <div class="drive-field-label" id="drive-time-label">Start time</div>
        <input type="time" id="drive-time" class="drive-time-input" oninput="calcDrive()" onclick="this.select()">
      </div>

      <!-- Duration -->
      <div class="drive-field">
        <div class="drive-field-label">Duration</div>
        <div class="drive-duration">
          <div class="drive-dur-card">
            <input type="number" id="drive-hours" class="drive-dur-input" placeholder="0" min="0" max="23" oninput="calcDrive()" onclick="this.select()">
            <span class="drive-dur-unit">hr</span>
          </div>
          <div class="drive-dur-card">
            <input type="number" id="drive-mins" class="drive-dur-input" placeholder="0" min="0" max="59" oninput="calcDrive()" onclick="this.select()">
            <span class="drive-dur-unit">min</span>
          </div>
        </div>
      </div>

      <!-- Result -->
      <div class="drive-result-wrap" id="drive-result-wrap" style="display:none">
        <div class="drive-result-label" id="drive-result-label">You'll arrive at</div>
        <div class="drive-result" id="drive-result"></div>
      </div>

    </div>
  </div>
</div>

<script src="js/main.js"></script>
<script src="js/drive-time.js"></script>
<script>initNav();</script>
</body>
</html>
